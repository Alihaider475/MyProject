# SafeSite AI — production compose.
#
# Database is self-hosted PostgreSQL inside this compose file (postgres service).
# Supabase is used only for Auth (JWT) and Storage (violation frames, worker
# photos) — never for the application database. DATABASE_URL points to the
# internal `postgres` service; see .env for POSTGRES_* credentials.
# Only nginx (:80) is exposed to the host — backend, postgres, redis are internal.
# All secrets are loaded from .env via env_file — nothing sensitive is hardcoded here.

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      # DATABASE_URL (self-hosted postgres), SUPABASE_* (Auth+Storage only),
      # SMTP_*, MQTT_*, webhook URLs, etc.
      # supplied at runtime, never baked into the image.
      - .env
    environment:
      # Non-secret operational overrides — wins over env_file values.
      APP_ENV: prod
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # In-network broker hostname — .env's MQTT_BROKER=localhost stays correct
      # for native (non-Docker) dev, where this override doesn't apply.
      MQTT_BROKER: mosquitto
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      # All runtime outputs (violation frames, challan PDFs, image/video uploads).
      - violation_frames:/app/data/violation_frames
      # Persist downloaded face-recognition weights across container recreates.
      - deepface_cache:/home/appuser/.deepface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      # YOLO model load + DeepFace warm-up takes 30-90s on first start.
      start_period: 120s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    ports:
      # Published to the host so a natively-run (non-Docker) backend can also
      # reach the broker at MQTT_BROKER=localhost per .env.
      - "127.0.0.1:1883:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ping -q 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Not published to the host — only reachable from other compose services.

volumes:
  violation_frames:
  deepface_cache:
  postgres_data:
  mosquitto_data:
