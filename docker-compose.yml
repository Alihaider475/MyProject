# SafeSite AI — production compose.
#
# Database stays external on Supabase cloud (DATABASE_URL comes from .env).
# Only nginx (:80) is exposed to the host — backend and redis are internal.
# All secrets are loaded from .env via env_file — nothing sensitive is hardcoded here.

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      # DATABASE_URL (Supabase), SUPABASE_*, SMTP_*, MQTT_*, webhook URLs, etc.
      # supplied at runtime, never baked into the image.
      - .env
    environment:
      # Non-secret operational overrides — wins over env_file values.
      APP_ENV: prod
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # All runtime outputs (violation frames, challan PDFs, image/video uploads).
      - violation_frames:/app/data/violation_frames
      # Persist downloaded face-recognition weights across container recreates.
      - deepface_cache:/home/appuser/.deepface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      # YOLO model load + DeepFace warm-up takes 30-90s on first start.
      start_period: 120s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  violation_frames:
  deepface_cache:
