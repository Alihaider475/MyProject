# SafeSite AI — production compose.
#
# Database stays external on Supabase cloud (DATABASE_URL comes from .env).
# The backend image bundles the compiled SPA and serves it on :8000.
# All secrets are loaded from .env via env_file — nothing sensitive is hardcoded here.

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      # DATABASE_URL (Supabase), SUPABASE_*, SUPABASE_JWT_SECRET, SMTP_*/EMAIL_PASSWORD,
      # MQTT_*, webhook URLs, etc. — supplied at runtime, never baked into the image.
      - .env
    environment:
      # Non-secret operational overrides. `environment` wins over `env_file`,
      # so this points the app at the bundled redis service regardless of .env.
      APP_ENV: prod
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # All runtime outputs (violation frames, challan/report PDFs, image_uploads,
      # video_uploads) live under data/violation_frames — one volume covers them.
      - violation_frames:/app/data/violation_frames
      # Persist downloaded face-recognition weights across container recreates.
      - deepface_cache:/home/appuser/.deepface
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  violation_frames:
  deepface_cache:
