server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing — serve real files, fall back to index.html
    # so React Router can handle navigation without 404s.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite-built assets have content-hashed filenames — safe to cache long-term.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket — live camera detection counts/events (/ws/{id}) and the
    # browser-webcam inbound frame push (/ws/{id}/push). The real backend
    # routes live at /api/v1/ws/... (no "stream" segment — verified against
    # backend/routes/stream.py and the frontend's wsUrl()/browserPushWsUrl()
    # builders); a stray "/stream" in this prefix previously meant requests
    # never matched here and fell through to the generic /api/ block below,
    # which has no Upgrade/Connection headers — silently breaking the
    # WebSocket upgrade. Fixed to the actual path prefix.
    location /api/v1/ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # MJPEG live camera stream — chunked response, must disable buffering.
    location /api/v1/stream/ {
        proxy_pass         http://backend:8000;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_set_header   Host $host;
    }

    # All other /api/* requests to FastAPI.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }
}
