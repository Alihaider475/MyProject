# SafeSite AI — development overlay.

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      APP_ENV: dev
      DATABASE_URL: sqlite+aiosqlite:///./ppe_detection.db
    volumes:
      - ./backend:/app/backend      # hot-reload backend code
    command:
      - uvicorn
      - backend.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - backend
    # To pass through a USB webcam on Linux, uncomment:
    # devices:
    #   - /dev/video0:/dev/video0

  redis:
    ports:
      - "6379:6379"    # expose redis to host for local inspection tools

  # frontend service is not needed in dev — run: cd frontend && npm run dev
  frontend:
    profiles:
      - donotstart
